<div class="chat-bubble-btn" (click)="toggleChat()">
  <span *ngIf="!isOpen">💬</span>
  <span *ngIf="isOpen">✕</span>
</div>

<div class="chat-window" *ngIf="isOpen">
  <div class="chat-header">
    <span class="chat-title">Assistant</span>
    <span class="chat-status">● En ligne</span>
  </div>

  <div class="chat-messages" #scrollContainer>
    <div *ngIf="messages.length === 0" class="chat-empty">
      Bonjour 👋 Comment puis-je vous aider ?
    </div>
    <div *ngFor="let msg of messages" class="msg-wrapper" [class.user-wrapper]="msg.role === 'user'">
      <div class="msg" [class.user]="msg.role === 'user'" [class.assistant]="msg.role === 'assistant'">
        {{ msg.content }}
      </div>
    </div>
    <div *ngIf="isLoading" class="msg-wrapper">
      <div class="msg assistant typing">
        <span></span><span></span><span></span>
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <input [(ngModel)]="userInput"
           (keyup.enter)="sendMessage()"
           placeholder="Écrire un message..."
           [disabled]="isLoading" />
    <button (click)="sendMessage()" [disabled]="isLoading || !userInput.trim()">
      ➤
    </button>
  </div>
</div>
