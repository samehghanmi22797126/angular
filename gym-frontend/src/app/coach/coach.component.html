<div class="container">

  <h2>Membres</h2>
  <form [formGroup]="memberForm" (ngSubmit)="addMember()">
    <input formControlName="name" placeholder="Nom">
    <input formControlName="age" type="number" placeholder="Age">
    <input formControlName="email" placeholder="Email">
    <input formControlName="password" placeholder="Mot de passe">
    <button type="submit">Ajouter membre</button>
  </form>

  <ul>
    <li *ngFor="let m of members">
      {{ m.name }} ({{ m.age }} ans) - {{ m.email }}
    </li>
  </ul>

  <hr>

  <h2>Cours</h2>
  <form [formGroup]="courseForm" (ngSubmit)="addCourse()">
    <input formControlName="title" placeholder="Titre du cours">
    <input formControlName="description" placeholder="Description">
    <input formControlName="startAt" type="datetime-local">
    <input formControlName="durationMinutes" type="number" placeholder="Durée (minutes)">
    <button type="submit">Ajouter cours</button>
  </form>

  <ul>
    <li *ngFor="let c of courses">
      {{ c.title }} - {{ c.description }} - {{ c.startAt }} ({{ c.durationMinutes }} min)
    </li>
  </ul>

</div>
